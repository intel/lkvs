- multi_vms:
    type = boot
    virt_test_type = qemu
    vm_accelerator = kvm
    vms = "vm1 vm2"
    image_snapshot = yes
    start_vm = yes
    vga = std
    auto_cpu_model = "no"
    cpu_model = host
    variants:
        - 1td_1vm:
            machine_type_extra_params_vm2 = "kernel-irqchip=split"
            vm_secure_guest_type_vm2 = tdx
        - 2td:
            machine_type_extra_params = "kernel-irqchip=split"
            vm_secure_guest_type = tdx
            variants:
                - 2vcpu:
                    smp = 2
                - 4vcpu:
                    smp = 4
                - 8vcpu:
                    smp = 8
                - 2vcpu_4vcpu:
                    smp_vm1 = 2
                    smp_vm2 = 4
                - 2vcpu_8vcpu:
                    smp_vm1 = 2
                    smp_vm2 = 8
                - 4vcpu_8vcpu:
                    smp_vm1 = 4
                    smp_vm2 = 8
                - 1G:
                    mem = 1024
                - 2G:
                    mem = 2048
                - 1G_2G:
                    mem_vm1 = 1024
                    mem_vm2 = 2048
        - 4td:
            machine_type_extra_params = "kernel-irqchip=split"
            vm_secure_guest_type = tdx
            vms = "vm1 vm2 vm3 vm4"
        - 2vm:
            variants:
                - 2vcpu:
                    smp = 2
                - 4vcpu:
                    smp = 4
                - 8vcpu:
                    smp = 8
                - 2vcpu_4vcpu:
                    smp_vm1 = 2
                    smp_vm2 = 4
                - 2vcpu_8vcpu:
                    smp_vm1 = 2
                    smp_vm2 = 8
                - 4vcpu_8vcpu:
                    smp_vm1 = 4
                    smp_vm2 = 8
                - 1G:
                    mem = 1024
                - 2G:
                    mem = 2048
                - 1G_2G:
                    mem_vm1 = 1024
                    mem_vm2 = 2048
        - 4vm:
            vms = "vm1 vm2 vm3 vm4"
        - many_vm_1G:
            type = multi_vms_multi_boot
            start_vm = no
            host_nofile_limit = 65536
            guest_count_mem_overhead = 80
            mem = 1024
            max_mem = 1024
            auto_calc_guest_count = yes
            max_guest_count = 1024
