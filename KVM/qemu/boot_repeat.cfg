- boot_repeat:
    variants:
        - one_vm_repeat:
            virt_test_type = qemu
            vm_accelerator = kvm
            start_vm = no
            image_snapshot = yes
            vga = std
            auto_cpu_model = "no"
            cpu_model = host
            variants:
                - @default:
                    type = boot_repeat
                    variants:
                        - 10times:
                            iterations = 10
                            variants:
                                - one_cpu:
                                    smp = 1
                                    vcpu_maxcpus = 1
                                - four_cpu:
                                    smp = 4
                                    vcpu_maxcpus = 4
                        - 20times:
                            iterations = 20
                            variants:
                                - four_cpu:
                                    smp = 4
                                    vcpu_maxcpus = 4
                    variants:
                        - one_socket:
                            vcpu_sockets = 1
                        - two_socket:
                            vcpu_sockets = 2
                            no one_cpu
                    variants:
                        - vm:
                        - td:
                            machine_type_extra_params = "kernel-irqchip=split"
                            vm_secure_guest_type = tdx
                - memory_sweep:
                    type = multi_vms_multi_boot
                    vms = "vm1"
                    start_mem = 1024
                    mem_generator = random_32g_window
                    random_min = 0
                    random_max = 64
                    random_unit = 511
                    samples_per_window = 2
                    window_size = 32768
                    variants:
                        - 1vm:
                            variants:
                                - from1G_toall:
                        - 1td:
                            machine_type_extra_params = "kernel-irqchip=split"
                            vm_secure_guest_type = tdx
                            variants:
                                - from1G_toall:

        - multi_vms_repeat:
            virt_test_type = qemu
            vm_accelerator = kvm
            image_snapshot = yes
            start_vm = no
            vga = std
            auto_cpu_model = "no"
            cpu_model = host
            variants:
                - @default:
                    type = boot_repeat
                    smp = 4
                    vcpu_maxcpus = 4
                    mem = 16384
                    variants:
                        - 20times:
                            iterations = 20
                            variants:
                                - 4td:
                                    machine_type_extra_params = "kernel-irqchip=split"
                                    vm_secure_guest_type = tdx
                                    vms = "vm1 vm2 vm3 vm4"
                                - 4vm:
                                    vms = "vm1 vm2 vm3 vm4"
                - memory_sweep:
                    type = multi_vms_multi_boot
                    start_mem = 1024
                    mem_generator = random_32g_window
                    random_min = 0
                    random_max = 64
                    random_unit = 511
                    samples_per_window = 2
                    window_size = 32768
                    divide_host_mem_limit_by_vm_count = yes
                    variants:
                        - 1td_1vm:
                            vms = "vm1 vm2"
                            machine_type_extra_params_vm2 = "kernel-irqchip=split"
                            vm_secure_guest_type_vm2 = tdx
                            variants:
                                - from1G_toall:
                        - 2td:
                            vms = "vm1 vm2"
                            machine_type_extra_params = "kernel-irqchip=split"
                            vm_secure_guest_type = tdx
                            variants:
                                - from1G_toall:
                        - 4td:
                            vms = "vm1 vm2 vm3 vm4"
                            machine_type_extra_params = "kernel-irqchip=split"
                            vm_secure_guest_type = tdx
                            variants:
                                - from1G_toall:
                        - 2vm:
                            vms = "vm1 vm2"
                            variants:
                                - from1G_toall:
                        - 4vm:
                            vms = "vm1 vm2 vm3 vm4"
                            variants:
                                - from1G_toall:
